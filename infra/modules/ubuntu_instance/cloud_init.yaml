#cloud-config
package_update: true
package_upgrade: true
packages:
  - unattended-upgrades
  - ufw

users: []

ssh_pwauth: true # disable password authentication for ssh
ssh_deletekeys: true # delete existing ssh host keys

# Disable and mask ssh services to prevent ssh access
runcmd:
  - [ systemctl, stop, ssh ]
  - [ systemctl, mask, ssh ]
  - [ systemctl, stop, sshd ]
  - [ systemctl, mask, sshd ]
  - [ ufw, default, deny, incoming ]
  - [ ufw, default, allow, outgoing ]
  - [ ufw, allow, https ]
  - [ ufw, --force, enable ]
